<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세내용</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <h1><a href="/board">커뮤니티게시판</a></h1>
    <div><span class="user" id="userId">{유저}</span>님</div>
    <button type="button" id="logout" class="logout" onclick="localStorage.removeItem('myToken'); location.href='/';">로그아웃</button>
  </header>
  <main>
    <section>
      <form class="edit">
        <div class="company">
          <label for="input_title">공개여부</label>
          <select name="" class="select_company">
            <option value="public">전체글</option>
            <option value="company">회사글</option>
          </select>
        </div>
        <div class="title">
          <label for="input_title">제목</label>
          <input type="text" name="title" class="input_title">
        </div>
        <div class="author">
          <label for="input_author">작성자</label>
          <input type="text" name="author" class="input_author" readonly>
        </div>
        <div class="content">
          <label for="input_content">내용</label>
          <textarea name="content" class="input_content"></textarea>
        </div>
        <div class="button_wrap">
          <button type="button" class="btn_save">저장</button>
          <button type="button" class="btn_remove">삭제</button>
        </div>
      </form>
    </section>
  </main>
  <footer>
    <ul class="footer_list">
      <li><a href="/board">전체게시글</a></li>
      <li><a href="/company">우리회사</a></li>
      <li><a href="/mypage">내글관리</a></li>
      <li><a href="/write">등록</a></li>
    </ul>
  </footer>
</body>
<script type="module">
  /**
   * 파이프라인
   * 1. 데이터 로딩 
   *    - data의 해당하는 데이터의 내용 노출
   * 2. 데이터 수집
   *    - 저장 버튼 클릭시 수정한 내용 업데이트 요청 전달
   * 3. 데이터 처리 
   *    - 게시글 수정 및 삭제 
  */
 
  // 공통 인증 스크립트 연결
  import {checkAuth} from "/auth.js";

  // 입력값 변수 정의
   const inputs = {// 입력값 변수 정의
    title: document.querySelector(".input_title"),
    author: document.querySelector(".input_author"),
    content: document.querySelector(".input_content"),
    company: document.querySelector(".select_company")
  }
  const userName = document.querySelector("#userId");
  const btns = document.querySelector(".button_wrap");
  const btnSave = document.querySelector(".btn_save");
  const btnRemove = document.querySelector(".btn_remove");
  const params = new URLSearchParams(location.search); // location.search : url에서 ? 뒤에 값 가져오기
  const id = params.get("id"); // 거기서 id값만 가져오기
  
  // 초기 함수
  const init = async () => {
    console.log("초기 함수 실행 확인")

    // 인증 정보 가져오기
    const user = await checkAuth(); // user 변수에 checkAuth에서 받은 결과값 담기
    if(!user) return; // 인증 정보가 없을 경우 return
    userName.textContent = `${user.userId}`
    
    detail(user); // 상세 내용 조회
    deletePost(); // 게시글 삭제
    editPost(); // 수정페이지로 이동
  }
  init();

  // 상세 게시글 수정
  const detail = async (user) => {
    const response = await fetch(`/api/edit/${id}`); // 아이디값에 해당하는 데이터 가져오기
    const result = await response.json();
    const data = result.data[0];

    // 상세 내용에 데이터 넣기
    inputs.title.value = data.title;
    inputs.author.value = data.name;
    inputs.content.value = data.content;
    inputs.company.value = data.type;
  }

  // 게시글 삭제
  const deletePost = async (user) => {
    // 삭제 버튼 클릭 이벤트
    btnRemove.addEventListener("click", async (e) => {
      e.preventDefault(); // 입력폼 새로고침 방지
      const response = await fetch(`/api/delete/${id}`,{
        method: "delete" // 삭제 요청을 보내서
      });
      const result = await response.json(); // 응답 값이 들어오면
      if(result.success){ // 성공 요청이 들어오면
        alert("삭제되었습니다.");
        location.href = "/board";
      }
    });
  }
  // 게시글 수정
  const editPost = async (user) => {
    // 게시글 수정 페이지로 이동
    btnSave.addEventListener("click", async () => {
      console.log("클릭테스트")
      // 버튼 클릭시 입력된 값 가져오기
      const name = inputs.author.value;
      const title = inputs.title.value;
      const date = new Date().toISOString().slice(0,10); // 날짜를 년-월-일 형식으로 보냄
      const content = inputs.content.value;
      const company = inputs.company.value;

      try {
        const response = await fetch (`/api/edit/${id}`, {
          method: "put", // post로 요청 보내고
          headers: { "Content-Type": "application/json" }, // 헤더 타입을 json으로 설정 후
          body: JSON.stringify({ name, title, date, content, company }) // 요청할 내용을 json 형식으로 보냄
        });

        const data = await response.json(); // 요청 완료된 데이터를 json으로 받음

        if (data.success) {
          alert("수정이 완료되었어요!");
          window.location.href = "/board"; // 수정이 완료되면 게시판으로 이동
        } else {
          alert("수정이 실패했어요! 다시 확인해주세요!");
        }
      } catch (error) {
        console.error("edit error:", error)
        alert("수정 중 오류가 발생했어요! 다시 시도해주세요!");
      }
    });
  }
</script>
</html>
