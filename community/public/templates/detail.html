<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세내용</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <h1><a href="/board">커뮤니티게시판</a></h1>
    <div><span class="user" id="userId">{유저}</span>님</div>
    <button type="button" id="logout" class="logout" onclick="localStorage.removeItem('myToken'); location.href='/';">로그아웃</button>
  </header>
  <main>
    <section>
      <div class="detail">
        <div class="title">제목</div>
        <div class="author">작성자</div>
        <div class="date">날짜</div>
        <div class="content">내용</div>
        <div class="button_wrap">
          <button type="button" class="btn_edit">수정</button>
          <button type="button" class="btn_remove">삭제</button>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <ul class="footer_list">
      <li><a href="/board">전체게시글</a></li>
      <li><a href="/company">우리회사</a></li>
      <li><a href="/mypage">내글관리</a></li>
      <li><a href="/write">등록</a></li>
    </ul>
  </footer>
</body>
<script type="module">
  /**
   * 파이프라인
   * 1. 데이터 로딩 
   *    - data의 해당하는 데이터의 내용 노출
   * 2. 데이터 수집: 본인이 작성한 글인지 체크
   *    - 본인 글일 경우 수정/삭제 버튼 노출 
   * 3. 데이터 처리 
   *    - 본인이 작성했을 경우 수정,삭제 가능
  */
 
  // 공통 인증 스크립트 연결
  import {checkAuth} from "/auth.js";

  // 입력값 변수 정의
  const userName = document.querySelector("#userId");
  const title = document.querySelector(".title");
  const author = document.querySelector(".author");
  const date = document.querySelector(".date");
  const content = document.querySelector(".content");
  const btns = document.querySelector(".button_wrap");
  const btnRemove = document.querySelector(".btn_remove");
  const btnEdit = document.querySelector(".btn_edit");
  const params = new URLSearchParams(location.search); // location.search : url에서 ? 뒤에 값 가져오기
  const id = params.get("id"); // 거기서 id값만 가져오기
  
  // 초기 함수
  const init = async () => {
    console.log("초기 함수 실행 확인")

    // 인증 정보 가져오기
    const user = await checkAuth(); // user 변수에 checkAuth에서 받은 결과값 담기
    if(!user) return; // 인증 정보가 없을 경우 return
    userName.textContent = `${user.userId}`
    
    detail(user); // 상세 내용 조회
    deletePost(); // 게시글 삭제
    editPost(); // 수정페이지로 이동

  }
  init();
  // 상세 게시글 조회
  const detail = async (user) => {
    const response = await fetch(`/api/detail/${id}`); // 아이디값에 해당하는 데이터 가져오기
    const result = await response.json();
    const data = result.data[0];

    // 상세 내용에 데이터 넣기
    title.textContent = data.title;
    author.textContent = data.name;
    date.textContent = data.date;
    content.textContent = data.content;

    // 내가 쓴 글이면
    if(user.userId === data.user_id) {
      btns.style.display = "flex"; // 버튼들 노출
      console.log("되는중"); // 기능 동착 확인
    } else {
      btns.style.display = "none"; // 버튼들 숨김
    }
  }

  // 게시글 삭제
  const deletePost = async (user) => {
    // 삭제 버튼 클릭 이벤트
    btnRemove.addEventListener("click", async () => {
      const response = await fetch(`/api/delete/${id}`,{
        method: "delete" // 삭제 요청을 보내서
      });
      const result = await response.json(); // 응답 값이 들어오면
      if(result.success){ // 성공 요청이 들어오면
        alert("삭제되었습니다.");
        location.href = "/board";
      }
    });
  }

  const editPost = async (user) => {
    // 게시글 수정 페이지로 이동
    btnEdit.addEventListener("click", async () => {
      // ?id=${id} : 쿼리 파라미터
      // 쿼리 파라미터 사용 이유 : server.js에서 라우팅을 한단계만 설정해놨기 때문에 쿼리 파라미터를 사용하여 2단계 라우팅 적용
      window.location.href = `/edit?id=${id}`
    });
  }
</script>
</html>
