<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 TODO 리스트!</title>
  <link rel="stylesheet" href="../assets/css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="title">
    <h1>My To-Do List</h1>
    <p class="desc">현재 진행 상황을 확인해보세요! ✨</p>
  </header>
  <main>
    <section class="card">
      <div class="countBox">
        <div class="totalBox">
          <span class="title">총 할 일</span>
          <span id="totalCount" class="count"></span>
        </div>
        <div class="ingBox">
          <span class="title">진행중</span>
          <span id="ingCount" class="count"></span>
        </div>
        <div class="endBox">
          <span class="title">완료</span>
          <span id="endCount" class="count"></span>
        </div>
        <div class="endperBox">
          <span class="title">완료율</span>
          <span id="endPer" class="count"></span>
        </div>
      </div>
      <div class="chartBox">
        <p class="chartTitle">완료 여부</p>
        <canvas id="completedChart" class="chart"></canvas>
      </div>

      <div class="buttonWrap">
        <a href="home.html" class="button">돌아가기</button>
        <a href="map.html" class="button">학원 찾아보기</button>
      </div>
    </section>
    <section>
      <div class="tip">💡 Tip: 대문자 P도 할 수 이쒀요!! 일정 관리 할 수 이쒀요!!</div>
    </section>
  </main>
  <footer class="footer">
    <p>© 2026 한경 부트캠프 | 한이슬</p>
  </footer>
</body>
<script src="../assets/js/todo.js"></script>
<script>
  
  // 데이터 로딩 : 로컬스토리지에 저장한 데이터 가져오기
  const data = localStorage.getItem("todoResult"); // localStorage.setItem으로 등록한 데이터
  const userdata = JSON.parse(data); // JSON 문자열을 객체로 변환

  // 완료/진행 구분
  const total = userdata.length; // 데이터 객체 총 갯수
  const completedCount = (userdata.filter(item => item.completed).length); // 완료 여부 체크 (필터로 완료된것만 뽑아서 length로 갯수 확인)
  const ingCount = (userdata.length - completedCount);// 진행 여부 체크 (총 개수 - 완료개수)

  // 비율 계산 
  const completed = (completedCount/total) * 100; // (완료갯수 / 총갯수) * 100
  const ing = (ingCount/total) * 100; // (진행갯수 / 총갯수) * 100

  // 갯수 텍스트 집어넣기
  document.querySelector("#totalCount").textContent = total; 
  document.querySelector("#ingCount").textContent = ingCount;
  document.querySelector("#endCount").textContent = completedCount;
  document.querySelector("#endPer").textContent = completed;

  // 완료 여부 차트
  const chart = document.getElementById('completedChart').getContext('2d');
  new Chart(chart, {
      type: 'doughnut', // 차트 타입
      data: {
          labels: ['완료', '진행'], // 차트 라벨
          datasets: [{
              data: [completed, ing], // 보여질 차트 값들
              backgroundColor: ['#ff5abf', '#9f6bff',] // 차트 컬러
          }]
      },
      options: {
          plugins: { legend: { position: 'bottom' } }, // 라벨 위치
          cutout: '40%' // 도넛 두께
      }
  });

</script>
</html>
